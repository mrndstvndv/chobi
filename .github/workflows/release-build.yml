name: Release Build

on:
  workflow_dispatch:
    inputs:
      build_type:
        description: "Build type"
        required: true
        default: "apk"
        type: choice
        options:
          - apk
          - aab

env:
  KEYSTORE_FILE: app/release.jks
  PROPERTIES_FILE: keystore.properties

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: temurin

      - name: Decode keystore
        run: echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > app/release.jks

      - name: Write properties
        run: |
          cat > keystore.properties << EOF
          storeFile=app/release.jks
          storePassword=${{ secrets.KEYSTORE_PASS }}
          keyAlias=${{ secrets.KEY_ALIAS }}
          keyPassword=${{ secrets.KEY_PASS }}
          EOF

      - name: Build APK
        if: inputs.build_type == 'apk' || inputs.build_type == 'aab'
        run: ./gradlew assembleRelease

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: chobi-release-apk
          path: app/build/outputs/apk/release/*.apk

      - name: Upload AAB
        uses: actions/upload-artifact@v4
        with:
          name: chobi-release-aab
          path: app/build/outputs/bundle/release/*.aab

      - name: Upload credentials
        uses: actions/upload-artifact@v4
        with:
          name: chobi-signing-credentials
          path: |
            app/release.jks
            keystore.properties
